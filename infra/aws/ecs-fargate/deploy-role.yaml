AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for GitHub Actions to deploy ReinforceSpec API to ECS Fargate.

Parameters:
  GitHubOrg:
    Type: String
    Default: reinforce-spec
    Description: GitHub organization or username.

  GitHubRepo:
    Type: String
    Default: reinforce-spec
    Description: GitHub repository name.

  OIDCProviderArn:
    Type: String
    Default: ''
    Description: Existing GitHub OIDC provider ARN. If empty, a new one will be created.

Conditions:
  CreateOIDCProvider: !Equals [!Ref OIDCProviderArn, '']

Resources:
  # =============================================================================
  # GitHub OIDC Provider (if not exists)
  # =============================================================================
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateOIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd
      Tags:
        - Key: Project
          Value: reinforce-spec

  # =============================================================================
  # Deployment IAM Role
  # =============================================================================
  DeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ReinforceSpecAPIDeployRole
      Description: Role for GitHub Actions to deploy ReinforceSpec API
      MaxSessionDuration: 7200
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - CreateOIDCProvider
                - !GetAtt GitHubOIDCProvider.Arn
                - !Ref OIDCProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub:
                  - !Sub repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/main
                  - !Sub repo:${GitHubOrg}/${GitHubRepo}:ref:refs/tags/*
                  - !Sub repo:${GitHubOrg}/${GitHubRepo}:environment:*
      ManagedPolicyArns:
        - !Ref DeployPolicy

  # =============================================================================
  # Deployment Policy
  # =============================================================================
  DeployPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: ReinforceSpecAPIDeployPolicy
      Description: Permissions for deploying ReinforceSpec API to ECS
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # ECR permissions
          - Sid: ECRLogin
            Effect: Allow
            Action:
              - ecr:GetAuthorizationToken
            Resource: '*'

          - Sid: ECRRepository
            Effect: Allow
            Action:
              - ecr:BatchCheckLayerAvailability
              - ecr:BatchGetImage
              - ecr:CompleteLayerUpload
              - ecr:CreateRepository
              - ecr:DescribeImages
              - ecr:DescribeRepositories
              - ecr:GetDownloadUrlForLayer
              - ecr:GetRepositoryPolicy
              - ecr:InitiateLayerUpload
              - ecr:ListImages
              - ecr:PutImage
              - ecr:UploadLayerPart
              - ecr:SetRepositoryPolicy
            Resource:
              - !Sub arn:aws:ecr:*:${AWS::AccountId}:repository/reinforce-spec

          # CloudFormation permissions
          - Sid: CloudFormation
            Effect: Allow
            Action:
              - cloudformation:CreateStack
              - cloudformation:UpdateStack
              - cloudformation:DeleteStack
              - cloudformation:DescribeStacks
              - cloudformation:DescribeStackEvents
              - cloudformation:DescribeStackResources
              - cloudformation:GetTemplate
              - cloudformation:ValidateTemplate
              - cloudformation:CreateChangeSet
              - cloudformation:DescribeChangeSet
              - cloudformation:ExecuteChangeSet
              - cloudformation:DeleteChangeSet
              - cloudformation:ListStackResources
            Resource:
              - !Sub arn:aws:cloudformation:*:${AWS::AccountId}:stack/reinforce-spec-api/*
              - !Sub arn:aws:cloudformation:*:${AWS::AccountId}:stack/reinforce-spec-api

          # ECS permissions
          - Sid: ECS
            Effect: Allow
            Action:
              - ecs:CreateCluster
              - ecs:CreateService
              - ecs:DeleteCluster
              - ecs:DeleteService
              - ecs:DeregisterTaskDefinition
              - ecs:DescribeClusters
              - ecs:DescribeServices
              - ecs:DescribeTaskDefinition
              - ecs:DescribeTasks
              - ecs:ListServices
              - ecs:ListTasks
              - ecs:RegisterTaskDefinition
              - ecs:RunTask
              - ecs:StopTask
              - ecs:TagResource
              - ecs:UpdateService
            Resource: '*'

          - Sid: ECSWaitForStability
            Effect: Allow
            Action:
              - ecs:DescribeServices
            Resource: '*'

          # ELB permissions
          - Sid: ELB
            Effect: Allow
            Action:
              - elasticloadbalancing:CreateLoadBalancer
              - elasticloadbalancing:CreateTargetGroup
              - elasticloadbalancing:CreateListener
              - elasticloadbalancing:CreateRule
              - elasticloadbalancing:DeleteLoadBalancer
              - elasticloadbalancing:DeleteTargetGroup
              - elasticloadbalancing:DeleteListener
              - elasticloadbalancing:DeleteRule
              - elasticloadbalancing:DeregisterTargets
              - elasticloadbalancing:DescribeListeners
              - elasticloadbalancing:DescribeLoadBalancers
              - elasticloadbalancing:DescribeRules
              - elasticloadbalancing:DescribeTags
              - elasticloadbalancing:DescribeTargetGroups
              - elasticloadbalancing:DescribeTargetHealth
              - elasticloadbalancing:ModifyLoadBalancerAttributes
              - elasticloadbalancing:ModifyListener
              - elasticloadbalancing:ModifyRule
              - elasticloadbalancing:ModifyTargetGroup
              - elasticloadbalancing:ModifyTargetGroupAttributes
              - elasticloadbalancing:RegisterTargets
              - elasticloadbalancing:SetSecurityGroups
              - elasticloadbalancing:SetSubnets
              - elasticloadbalancing:AddTags
              - elasticloadbalancing:RemoveTags
            Resource: '*'

          # EC2 permissions (for security groups, etc.)
          - Sid: EC2
            Effect: Allow
            Action:
              - ec2:AuthorizeSecurityGroupEgress
              - ec2:AuthorizeSecurityGroupIngress
              - ec2:CreateSecurityGroup
              - ec2:DeleteSecurityGroup
              - ec2:DescribeNetworkInterfaces
              - ec2:DescribeSecurityGroups
              - ec2:DescribeSubnets
              - ec2:DescribeVpcs
              - ec2:RevokeSecurityGroupEgress
              - ec2:RevokeSecurityGroupIngress
              - ec2:CreateTags
              - ec2:DeleteTags
            Resource: '*'

          # EFS permissions
          - Sid: EFS
            Effect: Allow
            Action:
              - elasticfilesystem:CreateFileSystem
              - elasticfilesystem:CreateMountTarget
              - elasticfilesystem:CreateAccessPoint
              - elasticfilesystem:DeleteFileSystem
              - elasticfilesystem:DeleteMountTarget
              - elasticfilesystem:DeleteAccessPoint
              - elasticfilesystem:DescribeAccessPoints
              - elasticfilesystem:DescribeFileSystems
              - elasticfilesystem:DescribeMountTargets
              - elasticfilesystem:DescribeMountTargetSecurityGroups
              - elasticfilesystem:ModifyMountTargetSecurityGroups
              - elasticfilesystem:TagResource
              - elasticfilesystem:UntagResource
            Resource: '*'

          # IAM permissions (for task roles)
          - Sid: IAM
            Effect: Allow
            Action:
              - iam:AttachRolePolicy
              - iam:CreateRole
              - iam:CreatePolicy
              - iam:DeleteRole
              - iam:DeleteRolePolicy
              - iam:DetachRolePolicy
              - iam:GetRole
              - iam:GetRolePolicy
              - iam:ListAttachedRolePolicies
              - iam:ListRolePolicies
              - iam:PassRole
              - iam:PutRolePolicy
              - iam:TagRole
              - iam:UntagRole
            Resource:
              - !Sub arn:aws:iam::${AWS::AccountId}:role/reinforce-spec-*
              - !Sub arn:aws:iam::${AWS::AccountId}:policy/reinforce-spec-*

          # CloudWatch Logs
          - Sid: CloudWatchLogs
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:DeleteLogGroup
              - logs:DescribeLogGroups
              - logs:PutRetentionPolicy
              - logs:TagLogGroup
              - logs:TagResource
            Resource:
              - !Sub arn:aws:logs:*:${AWS::AccountId}:log-group:/ecs/reinforce-spec*

          # Application Auto Scaling
          - Sid: AutoScaling
            Effect: Allow
            Action:
              - application-autoscaling:DeleteScalingPolicy
              - application-autoscaling:DeregisterScalableTarget
              - application-autoscaling:DescribeScalableTargets
              - application-autoscaling:DescribeScalingPolicies
              - application-autoscaling:PutScalingPolicy
              - application-autoscaling:RegisterScalableTarget
            Resource: '*'

          # Route53 (optional DNS)
          - Sid: Route53
            Effect: Allow
            Action:
              - route53:ChangeResourceRecordSets
              - route53:GetHostedZone
              - route53:ListHostedZones
              - route53:ListResourceRecordSets
            Resource: '*'

          # Secrets Manager (read-only for task)
          - Sid: SecretsManager
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:DescribeSecret
            Resource:
              - !Sub arn:aws:secretsmanager:*:${AWS::AccountId}:secret:reinforce-spec*
              - !Sub arn:aws:secretsmanager:*:${AWS::AccountId}:secret:openrouter*
              - !Sub arn:aws:secretsmanager:*:${AWS::AccountId}:secret:rds!*

          # ACM (read certificates)
          - Sid: ACM
            Effect: Allow
            Action:
              - acm:DescribeCertificate
              - acm:ListCertificates
            Resource: '*'

Outputs:
  DeployRoleArn:
    Description: ARN of the deployment IAM role for GitHub Actions
    Value: !GetAtt DeployRole.Arn
    Export:
      Name: ReinforceSpecAPIDeployRoleArn

  OIDCProviderArn:
    Description: ARN of the GitHub OIDC provider
    Value: !If
      - CreateOIDCProvider
      - !GetAtt GitHubOIDCProvider.Arn
      - !Ref OIDCProviderArn
