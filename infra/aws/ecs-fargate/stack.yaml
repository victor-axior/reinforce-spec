AWSTemplateFormatVersion: '2010-09-09'
Description: ReinforceSpec on ECS Fargate with ALB, EFS persistence, and autoscaling.

Parameters:
  ProjectName:
    Type: String
    Default: reinforce-spec
  VpcId:
    Type: AWS::EC2::VPC::Id
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least 2 public subnets for ALB.
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least 2 private subnets for ECS tasks and EFS mount targets.
  ContainerImage:
    Type: String
    Description: Full ECR image URI including tag.
  CertificateArn:
    Type: String
    Description: ACM certificate ARN for HTTPS listener.
  HostedZoneId:
    Type: String
    Default: ''
    Description: Optional existing Route53 hosted zone ID. If empty and DomainName is provided, a new hosted zone will be created.
  ApiDomainName:
    Type: String
    Default: ''
    Description: Optional custom API domain (e.g., api.example.com).
  DomainName:
    Type: String
    Default: ''
    Description: Root domain name for creating a new Route53 hosted zone (e.g., axior.dev). Leave empty to skip hosted zone creation.
  OpenRouterApiKeySecretArn:
    Type: String
    Description: Secrets Manager secret ARN containing OPENROUTER_API_KEY.
  DatabaseSecretArn:
    Type: String
    Default: ''
    Description: Secrets Manager secret ARN containing PostgreSQL DATABASE_URL (leave empty to skip).
  DesiredCount:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 20
  MinTaskCount:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 20
  MaxTaskCount:
    Type: Number
    Default: 6
    MinValue: 1
    MaxValue: 100
  ContainerPort:
    Type: Number
    Default: 8000
  TaskCpu:
    Type: String
    Default: '1024'
    AllowedValues: ['256', '512', '1024', '2048', '4096']
  TaskMemory:
    Type: String
    Default: '2048'
    AllowedValues: ['512', '1024', '2048', '3072', '4096', '5120', '6144', '7168', '8192', '9216', '10240', '11264', '12288', '13312', '14336', '15360', '16384', '17408', '18432', '19456', '20480', '21504', '22528', '23552', '24576', '25600', '26624', '27648', '28672', '29696', '30720']
  HealthCheckPath:
    Type: String
    Default: /v1/health
  IngressCidr:
    Type: String
    Default: 0.0.0.0/0
  LogLevel:
    Type: String
    Default: info
    AllowedValues: [trace, debug, info, warning, error, critical]
  Workers:
    Type: Number
    Default: 2
    MinValue: 1
    MaxValue: 16

Conditions:
  CreateHostedZone: !And
    - !Not [!Equals [!Ref DomainName, '']]
    - !Equals [!Ref HostedZoneId, '']
  UseExistingHostedZone: !Not [!Equals [!Ref HostedZoneId, '']]
  HasDatabaseSecret: !Not [!Equals [!Ref DatabaseSecretArn, '']]
  CreateCustomDomainRecord: !And
    - !Not [!Equals [!Ref ApiDomainName, '']]
    - !Or
      - !Condition CreateHostedZone
      - !Condition UseExistingHostedZone

Resources:
  HostedZone:
    Type: AWS::Route53::HostedZone
    Condition: CreateHostedZone
    Properties:
      Name: !Ref DomainName
      HostedZoneConfig:
        Comment: !Sub 'Hosted zone for ${ProjectName}'

  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${ProjectName}-cluster'
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${ProjectName}'
      RetentionInDays: 30

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ProjectName} ALB security group'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref IngressCidr
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref IngressCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ProjectName} service security group'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ProjectName} EFS security group'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref ServiceSecurityGroup

  FileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Name
          Value: !Sub '${ProjectName}-efs'

  EfsAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref FileSystem
      PosixUser:
        Uid: '10001'
        Gid: '10001'
      RootDirectory:
        CreationInfo:
          OwnerUid: '10001'
          OwnerGid: '10001'
          Permissions: '755'
        Path: /reinforce-spec

  EfsMountTargetA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Select [0, !Ref PrivateSubnetIds]
      SecurityGroups: [!Ref EfsSecurityGroup]

  EfsMountTargetB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref FileSystem
      SubnetId: !Select [1, !Ref PrivateSubnetIds]
      SecurityGroups: [!Ref EfsSecurityGroup]

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${ProjectName}-alb'
      Type: application
      Scheme: internet-facing
      SecurityGroups: [!Ref AlbSecurityGroup]
      Subnets:
        - !Select [0, !Ref PublicSubnetIds]
        - !Select [1, !Ref PublicSubnetIds]

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${ProjectName}-tg'
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: !Ref ContainerPort
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckPath: !Ref HealthCheckPath
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: 200-399

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            StatusCode: HTTP_301

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  ApiDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: CreateCustomDomainRecord
    Properties:
      HostedZoneId: !If
        - CreateHostedZone
        - !Ref HostedZone
        - !Ref HostedZoneId
      Name: !Ref ApiDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt LoadBalancer.DNSName
        HostedZoneId: !GetAtt LoadBalancer.CanonicalHostedZoneID
        EvaluateTargetHealth: false

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-task-exec-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: read-secrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref OpenRouterApiKeySecretArn
              - !If
                - HasDatabaseSecret
                - Effect: Allow
                  Action:
                    - secretsmanager:GetSecretValue
                  Resource: !Ref DatabaseSecretArn
                - !Ref AWS::NoValue

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-task-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    DependsOn:
      - EfsMountTargetA
      - EfsMountTargetB
    Properties:
      Family: !Sub '${ProjectName}-task'
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      Volumes:
        - Name: app-data
          EFSVolumeConfiguration:
            FilesystemId: !Ref FileSystem
            TransitEncryption: ENABLED
            AuthorizationConfig:
              AccessPointId: !Ref EfsAccessPoint
              IAM: DISABLED
      ContainerDefinitions:
        - Name: api
          Image: !Ref ContainerImage
          Essential: true
          HealthCheck:
            Command:
              - CMD-SHELL
              - !Sub "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${ContainerPort}/v1/health', timeout=3)\" || exit 1"
            Interval: 30
            Timeout: 15
            Retries: 3
            StartPeriod: 120
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          MountPoints:
            - SourceVolume: app-data
              ContainerPath: /app/data
              ReadOnly: false
          Environment:
            - Name: RS_HOST
              Value: 0.0.0.0
            - Name: RS_PORT
              Value: !Sub '${ContainerPort}'
            - Name: RS_WORKERS
              Value: !Sub '${Workers}'
            - Name: RS_LOG_LEVEL
              Value: !Ref LogLevel
            - Name: RS_LOG_FORMAT
              Value: json
            - Name: RS_DATA_DIR
              Value: /app/data
          Secrets:
            - Name: OPENROUTER_API_KEY
              ValueFrom: !Ref OpenRouterApiKeySecretArn
            - !If
              - HasDatabaseSecret
              - Name: RS_DATABASE_URL
                ValueFrom: !Ref DatabaseSecretArn
              - !Ref AWS::NoValue
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: api

  Service:
    Type: AWS::ECS::Service
    DependsOn:
      - HttpsListener
    Properties:
      ServiceName: !Sub '${ProjectName}-service'
      Cluster: !Ref Cluster
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      HealthCheckGracePeriodSeconds: 180
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 100
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups: [!Ref ServiceSecurityGroup]
          Subnets:
            - !Select [0, !Ref PublicSubnetIds]
            - !Select [1, !Ref PublicSubnetIds]
      LoadBalancers:
        - TargetGroupArn: !Ref TargetGroup
          ContainerName: api
          ContainerPort: !Ref ContainerPort

  ScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MinCapacity: !Ref MinTaskCount
      MaxCapacity: !Ref MaxTaskCount
      ResourceId: !Sub 'service/${Cluster}/${Service.Name}'
      RoleARN: !Sub 'arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService'
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  CpuTargetTrackingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub '${ProjectName}-cpu-target-tracking'
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: 60
        ScaleInCooldown: 60
        ScaleOutCooldown: 60
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization

Outputs:
  LoadBalancerDnsName:
    Value: !GetAtt LoadBalancer.DNSName
  HttpsUrl:
    Value: !Sub 'https://${LoadBalancer.DNSName}'
  CustomDomainUrl:
    Condition: CreateCustomDomainRecord
    Value: !Sub 'https://${ApiDomainName}'
  HostedZoneId:
    Condition: CreateHostedZone
    Value: !Ref HostedZone
    Description: Route53 Hosted Zone ID (update your domain registrar nameservers)
  HostedZoneNameServers:
    Condition: CreateHostedZone
    Value: !Join [', ', !GetAtt HostedZone.NameServers]
    Description: Nameservers to configure at your domain registrar
  ClusterName:
    Value: !Ref Cluster
  ServiceName:
    Value: !GetAtt Service.Name
  FileSystemId:
    Value: !Ref FileSystem