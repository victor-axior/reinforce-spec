name: Nightly Tests

on:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC daily
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: read

jobs:
  statistical:
    name: Statistical & Behavioral Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --all-extras
      - name: Run statistical tests
        run: >
          uv run pytest tests/statistical/
          -m statistical
          --tb=long -v
      - name: Run behavioral tests
        run: >
          uv run pytest tests/behavioral/
          -m behavioral
          --tb=long -v
